name: Auto Merge

on:
  pull_request:
    types: [labeled, synchronize]
    branches:
      - develop
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Wait for checks
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          running-workflow-name: auto-merge
          allowed-conclusions: success
          check-interval: 10
      
      - name: Check PR status
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            
            // Check if PR is mergeable
            if (!pr.mergeable) {
              core.setFailed('PR has conflicts and cannot be merged');
            }
            
            // Check if PR has required approvals
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const approved = reviews.data.some(r => r.state === 'APPROVED');
            if (!approved) {
              core.setFailed('PR requires at least one approval');
            }
      
      - name: Auto merge (Squash)
        uses: pascalgn/automerge-action@v0.15.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_RETRIES: 3
          MERGE_RETRY_SLEEP: 10000
      
      - name: Delete source branch
        uses: actions/github-script@v6
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (pr.head.ref !== 'develop' && pr.head.ref !== 'main') {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${pr.head.ref}`
                });
                console.log(`Deleted branch: ${pr.head.ref}`);
              } catch (error) {
                console.log(`Failed to delete branch: ${pr.head.ref}`);
              }
            }
      
      - name: Notify completion
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const success = ${{ job.status }} === 'success';
            const pr = context.payload.pull_request;
            
            const comment = success
              ? `✅ PR #${pr.number} merged successfully!\n\nBranch \`${pr.head.ref}\` has been deleted.`
              : `❌ Auto merge failed for PR #${pr.number}\n\nPlease check the logs and merge manually.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
