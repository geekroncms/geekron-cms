name = "geekron-cms-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Development configuration
[dev]
port = 3000
local_protocol = "http"

# Environment variables (non-sensitive)
[vars]
BUCKET_URL = "https://geekron-cms-files.r2.dev"
SUPABASE_URL = ""

# D1 Database (uncomment and update with your database ID)
# [[d1_databases]]
# binding = "DB"
# database_name = "geekron-cms"
# database_id = "your-database-id-here"

# R2 Bucket (uncomment and update with your bucket name)
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "geekron-cms-files"

# Secrets (set these via wrangler secret put):
# - JWT_SECRET
# - SUPABASE_KEY

# Development overrides (local)
[env.dev]
name = "geekron-cms-server-dev"

[env.dev.vars]
BUCKET_URL = "https://geekron-cms-files-dev.r2.dev"

# [env.dev.d1_databases]
# DB = { binding = "DB", database_name = "geekron-cms-dev", database_id = "dev-db-id" }

# [env.dev.r2_buckets]
# BUCKET = { binding = "BUCKET", bucket_name = "geekron-cms-files-dev" }

# Production configuration
[env.production]
name = "geekron-cms-server-prod"

[env.production.vars]
BUCKET_URL = "https://geekron-cms-files.r2.dev"

# [env.production.d1_databases]
# DB = { binding = "DB", database_name = "geekron-cms-prod", database_id = "prod-db-id" }

# [env.production.r2_buckets]
# BUCKET = { binding = "BUCKET", bucket_name = "geekron-cms-files-prod" }
